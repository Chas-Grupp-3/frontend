services:
  frontend:
    build: .
    platform: linux/amd64
    ports:
      - "5173:5173"
      - "5174:5174"
    volumes:
      - .:/app
      - /app/node_modules
      - turbo_cache:/app/.turbo
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - FORCE_COLOR=1
    stdin_open: true
    tty: true

volumes:
  turbo_cache: