name: CI

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type-check:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Clear npm cache and reinstall
        run: |
          npm cache clean --force
          rm -rf node_modules package-lock.json
          npm install

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run type-check

      - name: Check formatting
        run: npm run format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Clear npm cache and reinstall
        run: |
          npm cache clean --force
          rm -rf node_modules package-lock.json
          npm install

      - name: Run tests
        run: npm run test

  build:
    name: Build All
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Clear npm cache and reinstall
        run: |
          npm cache clean --force
          rm -rf node_modules package-lock.json
          npm install

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build all packages and apps
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: env.ACTIONS_RUNTIME_TOKEN != ''
        with:
          name: build-outputs
          path: |
            apps/*/dist/
            packages/*/dist/
          retention-days: 7
